<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - cnAgentOS</title>
    <link rel="stylesheet" href="/static/dist/layui-v2.13.6/layui/css/layui.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: rgba(255,255,255,0.95); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 50px 40px; width: 420px; }
        .login-header { text-align: center; margin-bottom: 40px; }
        .login-header .logo { font-size: 48px; color: #667eea; margin-bottom: 10px; }
        .login-header h1 { font-size: 28px; color: #333; margin: 0 0 10px 0; font-weight: 600; }
        .login-header p { color: #999; font-size: 14px; margin: 0; }
        .layui-form-item { margin-bottom: 25px; }
        .layui-form-item .layui-input { height: 50px; border-radius: 8px; font-size: 15px; }
        .layui-form-item .layui-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .login-btn { width: 100%; height: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 8px; font-size: 16px; color: #fff; cursor: pointer; transition: all 0.3s; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .login-footer { text-align: center; margin-top: 30px; }
        .login-footer a { color: #667eea; text-decoration: none; font-size: 14px; }
        .login-footer a:hover { text-decoration: underline; }
        .divider { display: flex; align-items: center; margin: 25px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e6e6e6; }
        .divider span { padding: 0 15px; color: #999; font-size: 13px; }
        .admin-link { display: block; text-align: center; color: #999; font-size: 13px; margin-top: 20px; }
        .admin-link:hover { color: #667eea; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <div class="logo">🤖</div>
        <h1>cnAgentOS</h1>
        <p>智能对话平台</p>
    </div>
    
    <form class="layui-form" id="loginForm">
        <input type="hidden" name="_xsrf" value="{{ xsrf_token }}">
        <div class="layui-form-item">
            <input type="text" name="username" placeholder="请输入用户名" class="layui-input" lay-verify="required" lay-reqtext="用户名不能为空">
        </div>
        <div class="layui-form-item">
            <input type="password" name="password" placeholder="请输入密码" class="layui-input" lay-verify="required" lay-reqtext="密码不能为空">
        </div>
        <div class="layui-form-item">
            <button type="submit" class="login-btn" lay-submit lay-filter="login">登 录</button>
        </div>
    </form>
    
    <div class="divider"><span>还没有账号？</span></div>
    
    <div class="login-footer">
        <a href="/auth/register">立即注册</a>
    </div>
    
    <a href="/auth/login" class="admin-link">管理员入口 →</a>
</div>

<script src="/static/dist/layui-v2.13.6/layui/layui.js"></script>
<script>
layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;
    
    form.on('submit(login)', function(data){
        var loadIndex = layer.load(2);
        
        fetch('/auth/user/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: 'username=' + encodeURIComponent(data.field.username) + 
                  '&password=' + encodeURIComponent(data.field.password) +
                  '&_xsrf=' + encodeURIComponent(data.field._xsrf)
        })
        .then(res => res.json())
        .then(res => {
            layer.close(loadIndex);
            if(res.code === 0){
                layer.msg(res.msg, {icon: 1, time: 1500}, function(){
                    window.location.href = res.url;
                });
            } else {
                layer.msg(res.msg, {icon: 2});
            }
        })
        .catch(err => {
            layer.close(loadIndex);
            layer.msg('网络错误，请稍后重试', {icon: 2});
        });
        
        return false;
    });
});
</script>
</body>
</html>
