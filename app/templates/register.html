<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - cnAgentOS</title>
    <link rel="stylesheet" href="/static/dist/layui-v2.13.6/layui/css/layui.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .register-container { background: rgba(255,255,255,0.95); border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 50px 40px; width: 420px; }
        .register-header { text-align: center; margin-bottom: 40px; }
        .register-header .logo { font-size: 48px; color: #667eea; margin-bottom: 10px; }
        .register-header h1 { font-size: 28px; color: #333; margin: 0 0 10px 0; font-weight: 600; }
        .register-header p { color: #999; font-size: 14px; margin: 0; }
        .layui-form-item { margin-bottom: 20px; }
        .layui-form-item .layui-input { height: 50px; border-radius: 8px; font-size: 15px; }
        .layui-form-item .layui-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .register-btn { width: 100%; height: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 8px; font-size: 16px; color: #fff; cursor: pointer; transition: all 0.3s; }
        .register-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        .register-footer { text-align: center; margin-top: 25px; }
        .register-footer a { color: #667eea; text-decoration: none; font-size: 14px; }
        .register-footer a:hover { text-decoration: underline; }
        .tips { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .tips p { margin: 5px 0; font-size: 13px; color: #666; }
        .tips p::before { content: '•'; margin-right: 8px; color: #667eea; }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-header">
        <div class="logo">🤖</div>
        <h1>注册账号</h1>
        <p>加入cnAgentOS智能对话平台</p>
    </div>
    
    <div class="tips">
        <p>用户名至少3个字符</p>
        <p>密码至少6个字符</p>
    </div>
    
    <form class="layui-form" id="registerForm">
        <input type="hidden" name="_xsrf" value="{{ xsrf_token }}">
        <div class="layui-form-item">
            <input type="text" name="username" placeholder="请输入用户名" class="layui-input" lay-verify="required" lay-reqtext="用户名不能为空">
        </div>
        <div class="layui-form-item">
            <input type="password" name="password" placeholder="请输入密码" class="layui-input" lay-verify="required|pass" lay-reqtext="密码不能为空">
        </div>
        <div class="layui-form-item">
            <input type="password" name="confirm_password" placeholder="请确认密码" class="layui-input" lay-verify="required" lay-reqtext="确认密码不能为空">
        </div>
        <div class="layui-form-item">
            <button type="submit" class="register-btn" lay-submit lay-filter="register">注 册</button>
        </div>
    </form>
    
    <div class="register-footer">
        已有账号？<a href="/auth/user/login">立即登录</a>
    </div>
</div>

<script src="/static/dist/layui-v2.13.6/layui/layui.js"></script>
<script>
layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;
    
    form.verify({
        pass: function(value){
            if(value.length < 6){
                return '密码至少6个字符';
            }
        }
    });
    
    form.on('submit(register)', function(data){
        if(data.field.password !== data.field.confirm_password){
            layer.msg('两次密码不一致', {icon: 2});
            return false;
        }
        
        var loadIndex = layer.load(2);
        
        fetch('/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: 'username=' + encodeURIComponent(data.field.username) + 
                  '&password=' + encodeURIComponent(data.field.password) +
                  '&confirm_password=' + encodeURIComponent(data.field.confirm_password) +
                  '&_xsrf=' + encodeURIComponent(data.field._xsrf)
        })
        .then(res => res.json())
        .then(res => {
            layer.close(loadIndex);
            if(res.code === 0){
                layer.msg(res.msg, {icon: 1, time: 1500}, function(){
                    window.location.href = res.url;
                });
            } else {
                layer.msg(res.msg, {icon: 2});
            }
        })
        .catch(err => {
            layer.close(loadIndex);
            layer.msg('网络错误，请稍后重试', {icon: 2});
        });
        
        return false;
    });
});
</script>
</body>
</html>
