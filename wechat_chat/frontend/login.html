<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智能聊天子系统</title>
    <link rel="stylesheet" href="/static/layui/css/layui.css">
    <style>
        body { background: #f2f2f2; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 400px; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .login-title { text-align: center; font-size: 24px; margin-bottom: 30px; color: #333; font-weight: 500; }
        .layui-form-item { margin-bottom: 20px; }
        .login-btn { width: 100%; height: 45px; font-size: 16px; background-color: #009688; }
        .reg-link { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
        .reg-link a { color: #009688; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-title">Wechat Chat 登录</div>
    <form class="layui-form">
        <div class="layui-form-item">
            <input type="text" name="username" placeholder="用户名" class="layui-input" required>
        </div>
        <div class="layui-form-item">
            <input type="password" name="password" placeholder="密码" class="layui-input" required>
        </div>
        <div class="layui-form-item">
            <button class="layui-btn login-btn" lay-submit lay-filter="login">登 录</button>
        </div>
    </form>
    <div class="reg-link">
        还没有账号？<a href="/wechat-chat/register">立即注册</a>
    </div>
</div>

<script src="/static/layui/layui.js"></script>
<script>
layui.use(['form', 'layer'], function(){
    var form = layui.form;
    var layer = layui.layer;
    var $ = layui.$;

    form.on('submit(login)', function(data){
        $.ajax({
            url: '/wechat-chat/login',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data.field),
            success: function(res){
                if(res.code === 0){
                    layer.msg('登录成功', {icon: 1, time: 1000}, function(){
                        window.location.href = res.url;
                    });
                } else {
                    layer.msg(res.msg, {icon: 2});
                }
            }
        });
        return false;
    });
});
</script>
</body>
</html>
